<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonus | AI Co-Producer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .neon-border { border: 1px solid #38bdf8; box-shadow: 0 0 10px #38bdf822; }
        .neon-text { color: #38bdf8; text-shadow: 0 0 5px #38bdf888; }
        .bg-vareon { background: linear-gradient(135deg, #161b22 0%, #0d1117 100%); }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; box-shadow: 0 0 15px #38bdf822; }
    </style>
</head>
<body class="bg-vareon min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-gray-800">
            <div>
                <h1 class="text-4xl font-bold neon-text">SONUS Dashboard</h1>
                <p class="text-gray-400">AI Co-Producer & Creative Partner for VAREON</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-blue-900/30 text-blue-400 rounded-full text-sm font-bold border border-blue-500/30">
                    PHASE 5: Heavyweight Ultra-Precision
                </span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Sidebar: Upload & Target -->
            <aside class="space-y-6">
                <div class="card p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <span class="mr-2">📁</span> Audio Input
                    </h2>
                    <input type="file" id="audioInput" class="hidden">
                    <button onclick="document.getElementById('audioInput').click()" 
                            class="w-full py-4 border-2 border-dashed border-gray-700 rounded-lg text-gray-400 hover:border-blue-500 hover:text-blue-500 transition">
                        Upload Track (.wav)
                    </button>
                    <p id="fileName" class="mt-3 text-sm text-blue-400"></p>
                </div>

                <div class="card p-6">
                    <h2 class="text-xl font-bold mb-4">Target Standards</h2>
                    <select id="labelSelect" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-white">
                        <option value="ophelia">Ophelia Records</option>
                        <option value="monstercat_uncaged">Monstercat Uncaged</option>
                        <option value="standard">Standard Reference</option>
                    </select>
                </div>

                <div class="card p-6 space-y-3">
                    <button onclick="runCritique()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition">Run Deep Critique</button>
                    <button onclick="runVibe()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-lg font-bold transition">Analyze Vibe</button>
                </div>
            </aside>

            <!-- Main Content: Reports & Charts -->
            <main class="md:col-span-2 space-y-6">
                <!-- Status Row -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="card p-4 text-center">
                        <p class="text-gray-400 text-xs uppercase tracking-widest">LUFS</p>
                        <p id="lufs_val" class="text-2xl font-bold text-green-400">--</p>
                    </div>
                    <div class="card p-4 text-center">
                        <p class="text-gray-400 text-xs uppercase tracking-widest">TRUE PEAK</p>
                        <p id="peak_val" class="text-2xl font-bold text-red-400">--</p>
                    </div>
                    <div class="card p-4 text-center">
                        <p class="text-gray-400 text-xs uppercase tracking-widest">SCORE</p>
                        <p id="score_val" class="text-2xl font-bold neon-text">--</p>
                    </div>
                </div>

                <!-- Analysis Findings -->
                <div class="card p-6 min-h-[400px]">
                    <h2 class="text-xl font-bold mb-6 flex items-center">
                        <span class="mr-2">🔬</span> Detailed Analysis Findings
                    </h2>
                    <div id="findings_list" class="space-y-4">
                        <p class="text-gray-500">Upload and run analysis to see findings.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const audioInput = document.getElementById('audioInput');
        audioInput.onchange = async (e) => {
            const file = e.target.files[0];
            document.getElementById('fileName').innerText = `Track Loaded: ${file.name}`;
            
            const formData = new FormData();
            formData.append('file', file);
            await fetch('/upload', { method: 'POST', body: formData });
        };

        async function runCritique() {
            const label = document.getElementById('labelSelect').value;
            const res = await fetch(`/critique?label=${label}`);
            const data = await res.json();
            
            document.getElementById('lufs_val').innerText = `${data.mastering_report.lufs.integrated_lufs.toFixed(1)} dB`;
            document.getElementById('peak_val').innerText = `${data.mastering_report.true_peak.true_peak_db.toFixed(2)} dB`;
            document.getElementById('score_val').innerText = `${data.overall_score.toFixed(1)}/10`;
            
            const list = document.getElementById('findings_list');
            list.innerHTML = '';
            data.findings.forEach(f => {
                const item = document.createElement('div');
                item.className = 'p-3 bg-red-900/10 border-l-4 border-red-500 text-red-200 text-sm';
                item.innerText = f;
                list.appendChild(item);
            });
        }

        async function runVibe() {
            const res = await fetch('/vibe');
            const data = await res.json();
            alert(`BPM: ${data.vibe.tempo.toFixed(1)} | Energy: ${data.vibe.vibe_estimate}`);
        }
    </script>
</body>
</html>
